name: cairoon

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  MOONBIT_INSTALL_VERSION: 0.10.4+4f2e8f7dc-nightly

jobs:
  native:
    name: native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libcairo2-dev build-essential

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install cairo pkg-config

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Update MoonBit registry
        run: moon update

      - name: Show tool versions
        run: |
          moon version
          pkg-config --modversion cairo

      - name: Configure generated Cairo constants
        run: scripts/configure-cairo-constants.sh

      - name: Run native reliability gate
        env:
          CAIROON_VERIFY_ASAN: "0"
        run: ./scripts/verify.sh

  asan:
    name: asan (ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libcairo2-dev libfontconfig1-dev clang llvm build-essential

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Update MoonBit registry
        run: moon update

      - name: Show tool versions
        run: |
          moon version
          clang --version
          pkg-config --modversion cairo

      - name: Configure generated Cairo constants
        run: scripts/configure-cairo-constants.sh

      - name: Run ASan, LSan, and UBSan package gate
        env:
          CAIROON_ASAN_CC: clang
          CAIROON_ASAN_AR: llvm-ar
          CAIROON_SANITIZER_LEAKS: "on"
        run: python3 ./scripts/sanitizers/run.py
